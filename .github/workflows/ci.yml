name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install hatchling ruff mypy
      - run: ruff check src/
      - run: mypy src/ --ignore-missing-imports --no-warn-unused-ignores

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK with dev deps
        run: |
          pip install hatchling
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --timeout=30
